<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermaid Visual Editor — Playground</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; }
      #root { padding: 20px; max-width: 1200px; margin: 0 auto; }
      h1 { font-size: 24px; margin-bottom: 16px; color: #1d1d1f; }
      .controls { display: flex; gap: 8px; margin-bottom: 16px; }
      .controls button { padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
      .controls button.active { background: #0071e3; color: #fff; border-color: #0071e3; }
      .output { margin-top: 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
      .output pre { font-size: 13px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
